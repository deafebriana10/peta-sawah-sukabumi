<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Sawah Sukabumi</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f1a;
            --bg-secondary: #111827;
            --bg-card: #1a2234;
            --bg-card-hover: #1f2a40;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #22d3ee;
            --accent-dim: rgba(34, 211, 238, 0.1);
            --green: #4ade80;
            --green-dim: rgba(74, 222, 128, 0.1);
            --amber: #fbbf24;
            --border: rgba(148, 163, 184, 0.1);
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 380px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar.collapsed {
            transform: translateX(-380px);
        }

        .sidebar-toggle {
            position: fixed;
            left: 380px;
            top: 16px;
            z-index: 1001;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            width: 36px;
            height: 36px;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 14px;
        }

        .sidebar.collapsed + .sidebar-toggle {
            left: 0;
            border-radius: 0 8px 8px 0;
        }

        .sidebar-header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent), var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .sidebar-header p {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Stats bar */
        .stats-bar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 2px;
        }

        /* Filter section */
        .filter-section {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
        }

        .filter-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .filter-group {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }

        .filter-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .filter-btn.active {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
        }

        .search-box {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 13px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            border-color: var(--accent);
        }

        .search-box::placeholder {
            color: var(--text-muted);
        }

        /* Kecamatan list */
        .kecamatan-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }

        .kecamatan-list::-webkit-scrollbar {
            width: 4px;
        }

        .kecamatan-list::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 4px;
        }

        .kec-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .kec-item:hover {
            background: var(--bg-card-hover);
        }

        .kec-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .kec-info {
            flex: 1;
            min-width: 0;
        }

        .kec-name {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .kec-detail {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .kec-luas {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--green);
            text-align: right;
            white-space: nowrap;
        }

        /* Download section */
        .download-section {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
        }

        .download-btn {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 13px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .download-btn:hover {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
        }

        .download-btn:last-child {
            margin-bottom: 0;
        }

        /* ===== MAP ===== */
        #map {
            position: fixed;
            left: 380px;
            top: 0;
            right: 0;
            bottom: 0;
            z-index: 500;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar.collapsed ~ #map {
            left: 0;
        }

        /* Leaflet popup custom */
        .leaflet-popup-content-wrapper {
            background: var(--bg-card) !important;
            border: 1px solid var(--border) !important;
            border-radius: 12px !important;
            box-shadow: var(--shadow) !important;
        }

        .leaflet-popup-content {
            color: var(--text-primary) !important;
            font-family: 'Plus Jakarta Sans', sans-serif !important;
            margin: 14px 16px !important;
        }

        .leaflet-popup-tip {
            background: var(--bg-card) !important;
            border: 1px solid var(--border) !important;
        }

        .popup-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--accent);
        }

        .popup-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 12px;
        }

        .popup-label {
            color: var(--text-muted);
        }

        .popup-value {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-primary);
            font-weight: 500;
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            margin-top: 16px;
            color: var(--text-muted);
            font-size: 14px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar { width: 320px; }
            .sidebar.collapsed { transform: translateX(-320px); }
            .sidebar-toggle { left: 320px; }
            .sidebar.collapsed + .sidebar-toggle { left: 0; }
            #map { left: 0; }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Memuat data sawah...</div>
</div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h1>🌾 Peta Sawah Sukabumi</h1>
        <p>Kabupaten & Kota Sukabumi — Data Poligon Sawah</p>
    </div>

    <div class="stats-bar" id="statsBar">
        <div class="stat-item">
            <div class="stat-value" id="statPoligon">—</div>
            <div class="stat-label">Poligon</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statKecamatan">—</div>
            <div class="stat-label">Kecamatan</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statLuas">—</div>
            <div class="stat-label">Total (ha)</div>
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-label">Kab / Kota</div>
        <div class="filter-group" id="filterKabKota">
            <button class="filter-btn active" data-filter="all">Semua</button>
            <button class="filter-btn" data-filter="Kabupaten Sukabumi">Kabupaten</button>
            <button class="filter-btn" data-filter="Kota Sukabumi">Kota</button>
        </div>
        <input type="text" class="search-box" id="searchBox" placeholder="🔍 Cari kecamatan...">
    </div>

    <div class="kecamatan-list" id="kecList"></div>

    <div class="download-section">
        <button class="download-btn" id="downloadGeojson">
            ⬇ Download GeoJSON
        </button>
        <button class="download-btn" id="downloadCsv">
            ⬇ Download CSV (Rekap)
        </button>
    </div>
</div>

<button class="sidebar-toggle" id="sidebarToggle">◀</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ===== COLOR PALETTE =====
const COLORS = [
    '#22d3ee','#4ade80','#fbbf24','#f87171','#a78bfa','#fb923c',
    '#34d399','#60a5fa','#f472b6','#a3e635','#e879f9','#38bdf8',
    '#facc15','#2dd4bf','#c084fc','#fb7185','#84cc16','#818cf8',
    '#f97316','#06b6d4','#10b981','#8b5cf6','#ef4444','#14b8a6',
    '#eab308','#6366f1','#ec4899','#0ea5e9','#d946ef','#f59e0b',
    '#3b82f6','#8b5cf6','#22c55e','#e11d48','#7c3aed','#0d9488',
    '#ca8a04','#9333ea','#dc2626','#059669','#7c2d12','#1d4ed8',
    '#b91c1c','#15803d','#9a3412','#4338ca','#be185d','#0e7490',
    '#854d0e','#6d28d9','#991b1b','#166534'
];

let map, geojsonLayer, geojsonData;
let colorMap = {};
let activeFilter = 'all';
let kecamatanStats = {};

// ===== INIT MAP =====
map = L.map('map', {
    center: [-6.95, 106.8],
    zoom: 10,
    zoomControl: false
});

L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    maxZoom: 19
}).addTo(map);

// ===== LOAD GEOJSON =====
async function loadData() {
    try {
        const response = await fetch('sawah_sukabumi.geojson');
        geojsonData = await response.json();
        processData();
        renderMap();
        renderSidebar();
        document.getElementById('loading').classList.add('hidden');
    } catch (e) {
        document.querySelector('.loading-text').textContent =
            'File sawah_sukabumi.geojson tidak ditemukan. Pastikan file ada di folder yang sama.';
        console.error(e);
    }
}

// ===== PROCESS DATA =====
function processData() {
    let kecSet = new Set();
    let colorIdx = 0;

    geojsonData.features.forEach(f => {
        const kec = f.properties.Kecamatan || 'Tidak Diketahui';
        const kk = f.properties.Kab_Kota || '';
        const luas = f.properties.Luas_ha || 0;

        if (!colorMap[kec]) {
            colorMap[kec] = COLORS[colorIdx % COLORS.length];
            colorIdx++;
        }

        if (!kecamatanStats[kec]) {
            kecamatanStats[kec] = { kab_kota: kk, count: 0, totalLuas: 0 };
        }
        kecamatanStats[kec].count++;
        kecamatanStats[kec].totalLuas += luas;
        kecSet.add(kec);
    });

    // Stats
    const totalLuas = Object.values(kecamatanStats).reduce((s, k) => s + k.totalLuas, 0);
    document.getElementById('statPoligon').textContent = geojsonData.features.length.toLocaleString('id');
    document.getElementById('statKecamatan').textContent = kecSet.size;
    document.getElementById('statLuas').textContent = totalLuas.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

// ===== RENDER MAP =====
function renderMap(filterKec = null) {
    if (geojsonLayer) map.removeLayer(geojsonLayer);

    geojsonLayer = L.geoJSON(geojsonData, {
        filter: function(feature) {
            const kk = feature.properties.Kab_Kota || '';
            const kec = feature.properties.Kecamatan || '';
            if (activeFilter !== 'all' && kk !== activeFilter) return false;
            if (filterKec && kec !== filterKec) return false;
            return true;
        },
        style: function(feature) {
            const kec = feature.properties.Kecamatan || 'Tidak Diketahui';
            return {
                fillColor: colorMap[kec],
                weight: 0.8,
                opacity: 0.9,
                color: '#ffffff30',
                fillOpacity: 0.7
            };
        },
        onEachFeature: function(feature, layer) {
            const p = feature.properties;
            layer.bindPopup(`
                <div class="popup-title">${p.Kecamatan || '-'}</div>
                <div class="popup-row">
                    <span class="popup-label">Kab/Kota</span>
                    <span class="popup-value">${p.Kab_Kota || '-'}</span>
                </div>
                <div class="popup-row">
                    <span class="popup-label">ID Poligon</span>
                    <span class="popup-value">${p.ID_Poligon || '-'}</span>
                </div>
                <div class="popup-row">
                    <span class="popup-label">Luas (m²)</span>
                    <span class="popup-value">${p.Luas_m2 ? p.Luas_m2.toLocaleString('id') : '-'}</span>
                </div>
                <div class="popup-row">
                    <span class="popup-label">Luas (ha)</span>
                    <span class="popup-value">${p.Luas_ha ? p.Luas_ha.toFixed(4) : '-'}</span>
                </div>
            `);

            layer.on('mouseover', function() {
                this.setStyle({ weight: 2, color: '#22d3ee', fillOpacity: 0.9 });
            });
            layer.on('mouseout', function() {
                geojsonLayer.resetStyle(this);
            });
        }
    }).addTo(map);

    if (geojsonLayer.getLayers().length > 0) {
        map.fitBounds(geojsonLayer.getBounds(), { padding: [20, 20] });
    }
}

// ===== RENDER SIDEBAR =====
function renderSidebar(searchTerm = '') {
    const listEl = document.getElementById('kecList');
    listEl.innerHTML = '';

    const sorted = Object.entries(kecamatanStats)
        .filter(([kec, stats]) => {
            if (activeFilter !== 'all' && stats.kab_kota !== activeFilter) return false;
            if (searchTerm && !kec.toLowerCase().includes(searchTerm.toLowerCase())) return false;
            return true;
        })
        .sort((a, b) => b[1].totalLuas - a[1].totalLuas);

    sorted.forEach(([kec, stats]) => {
        const item = document.createElement('div');
        item.className = 'kec-item';
        item.innerHTML = `
            <div class="kec-color" style="background:${colorMap[kec]}"></div>
            <div class="kec-info">
                <div class="kec-name">${kec}</div>
                <div class="kec-detail">${stats.count} poligon · ${stats.kab_kota === 'Kota Sukabumi' ? 'Kota' : 'Kab'}</div>
            </div>
            <div class="kec-luas">${stats.totalLuas.toFixed(1)} ha</div>
        `;
        item.addEventListener('click', () => {
            renderMap(kec);
        });
        listEl.appendChild(item);
    });
}

// ===== EVENT LISTENERS =====

// Filter Kab/Kota
document.getElementById('filterKabKota').addEventListener('click', (e) => {
    if (!e.target.classList.contains('filter-btn')) return;
    document.querySelectorAll('#filterKabKota .filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    activeFilter = e.target.dataset.filter;
    renderMap();
    renderSidebar(document.getElementById('searchBox').value);
});

// Search
document.getElementById('searchBox').addEventListener('input', (e) => {
    renderSidebar(e.target.value);
});

// Sidebar toggle
document.getElementById('sidebarToggle').addEventListener('click', () => {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('collapsed');
    const btn = document.getElementById('sidebarToggle');
    btn.textContent = sidebar.classList.contains('collapsed') ? '▶' : '◀';
    setTimeout(() => map.invalidateSize(), 300);
});

// Double click on list → reset to show all
document.getElementById('kecList').addEventListener('dblclick', () => {
    renderMap();
});

// Download GeoJSON
document.getElementById('downloadGeojson').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(geojsonData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'sawah_sukabumi.geojson';
    a.click();
    URL.revokeObjectURL(url);
});

// Download CSV
document.getElementById('downloadCsv').addEventListener('click', () => {
    let csv = 'Kab_Kota,Kecamatan,ID_Poligon,Luas_m2,Luas_ha\n';
    geojsonData.features.forEach(f => {
        const p = f.properties;
        csv += `"${p.Kab_Kota || ''}","${p.Kecamatan || ''}",${p.ID_Poligon || ''},${p.Luas_m2 || ''},${p.Luas_ha || ''}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'sawah_sukabumi_rekap.csv';
    a.click();
    URL.revokeObjectURL(url);
});

// ===== START =====
loadData();
</script>
</body>
</html>
